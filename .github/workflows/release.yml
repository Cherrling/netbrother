name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0). Leave empty to auto-generate."
        required: false
        type: string

jobs:
  build:
    name: Build ${{ matrix.target.os }}-${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        run: |
          BINARY="netbrother-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          CGO_ENABLED=0 GOOS=${{ matrix.target.os }} GOARCH=${{ matrix.target.arch }} \
            go build -ldflags "-X main.version=${{ steps.version.outputs.value }} -s -w" \
            -o "$BINARY" ./cmd/netbrother/

      - name: Package
        run: |
          BINARY="netbrother-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          tar czf "${BINARY}.tar.gz" "${BINARY}"

      - uses: actions/upload-artifact@v4
        with:
          name: netbrother-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: netbrother-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          pattern: netbrother-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          draft: true
          files: |
            netbrother-linux-amd64.tar.gz
            netbrother-linux-arm64.tar.gz
          generate_release_notes: true
